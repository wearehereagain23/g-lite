<div class="chat-workspace-drawer" id="secure-chat-drawer">
    <div class="chat-drawer-header">
        <div class="chat-title-meta">
            <div class="live-agent-status-indicator"></div>
            <div>
                <h4>G-Lite Encrypted Concierge</h4>
                <p>Session token verified</p>
            </div>
        </div>
        <button class="chat-drawer-close-btn" id="close-chat-drawer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <div class="chat-message-display-stream">
        <div class="msg-bubble incoming">
            <p>Hello, how can we assist your capital operations today?</p>
            <span class="msg-timestamp">17:15</span>
        </div>
    </div>

    <div class="chat-footer-input-matrix">
        <label class="chat-file-picker-btn">
            <input type="file" id="chat-hidden-file-input" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                </path>
            </svg>
        </label>
        <input type="text" class="chat-text-input-field" placeholder="Write operational query...">
        <button class="chat-msg-send-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>
